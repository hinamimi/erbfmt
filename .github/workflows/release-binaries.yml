name: Release Binaries

on:
  workflow_dispatch:
    inputs:
      rehearsal_version:
        description: Optional stable version used only inside the workflow runner
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            gem_platform: x86_64-linux-gnu
            archive: tar.gz
            binary: erbfmt
          - os: macos-15-intel
            target: x86_64-apple-darwin
            gem_platform: x86_64-darwin
            archive: tar.gz
            binary: erbfmt
          - os: macos-14
            target: aarch64-apple-darwin
            gem_platform: arm64-darwin
            archive: tar.gz
            binary: erbfmt
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            gem_platform: x64-mingw-ucrt
            archive: zip
            binary: erbfmt.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: packages/ruby

      - name: Prepare release rehearsal version
        if: inputs.rehearsal_version != ''
        run: ruby scripts/version.rb set "${{ inputs.rehearsal_version }}"

      - name: Verify release versions
        run: ruby scripts/version.rb verify

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build and verify Ruby gem
        working-directory: packages/ruby
        env:
          ERBFMT_BINARY: target/${{ matrix.target }}/release/${{ matrix.binary }}
        run: bundle exec rake gem:verify ERBFMT_PACKAGE_PLATFORM=${{ matrix.gem_platform }}

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail

          version="$(awk -F '"' '/^version =/ { print $2; exit }' Cargo.toml)"
          archive_base="erbfmt-${version}-${{ matrix.target }}"
          package_dir="dist/${archive_base}"

          write_sha256() {
            local file="$1"
            local checksum_file="$2"
            local base

            base="$(basename "$file")"

            if command -v sha256sum >/dev/null 2>&1; then
              (cd "$(dirname "$file")" && sha256sum "$base" > "$(basename "$checksum_file")")
            else
              (cd "$(dirname "$file")" && shasum -a 256 "$base" > "$(basename "$checksum_file")")
            fi
          }

          mkdir -p "$package_dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$package_dir/${{ matrix.binary }}"
          cp LICENSE.txt "$package_dir/LICENSE.txt"
          cp README.md "$package_dir/README.md"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd dist && 7z a -tzip "${archive_base}.zip" "$archive_base")
            write_sha256 "dist/${archive_base}.zip" "dist/${archive_base}.zip.sha256"
          else
            (cd dist && tar -czf "${archive_base}.tar.gz" "$archive_base")
            write_sha256 "dist/${archive_base}.tar.gz" "dist/${archive_base}.tar.gz.sha256"
          fi

      - name: Upload binary archive
        uses: actions/upload-artifact@v6
        with:
          name: erbfmt-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            packages/ruby/pkg/*.gem
          if-no-files-found: error
