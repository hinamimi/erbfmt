name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Check
        run: cargo check --all-targets --locked

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

      - name: Verify sample formatting
        run: |
          cargo run --quiet --locked -- samples/sample.html.erb
          cargo run --quiet --locked -- samples/stability.html.erb
          cargo run --quiet --locked -- samples/formatter-edge-cases.html.erb

      - name: Verify sample linting
        run: |
          cargo run --quiet --locked -- --lint samples/sample.html.erb
          cargo run --quiet --locked -- --lint samples/stability.html.erb

      - name: Verify intentional lint fixture
        run: |
          if cargo run --quiet --locked -- --lint samples/lint-next.html.erb; then
            echo "lint-next.html.erb should fail linting"
            exit 1
          fi

  vscode:
    name: VSCode Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix editors/vscode

      - name: Test extension
        run: npm test --prefix editors/vscode

      - name: Package extension
        run: npm run package --prefix editors/vscode

  ruby:
    name: Ruby Wrapper
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: packages/ruby

      - name: Test and verify release versions
        run: |
          ruby scripts/test/version_test.rb
          ruby scripts/version.rb verify

      - name: Build Rust binary
        run: cargo build --locked

      - name: Test and verify gem
        working-directory: packages/ruby
        env:
          ERBFMT_BINARY: ${{ github.workspace }}/target/debug/erbfmt
        run: bundle exec rake gem:verify
